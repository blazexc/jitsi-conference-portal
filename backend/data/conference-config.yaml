version: v1
updatedAt: "2026-03-21T00:00:00.000Z"
updatedBy: system-init
system:
  systemName: Jitsi 会议门户系统
  jitsiDomain: room.shukunnet.com
  defaultMeetingPrefix: grid
  enableRecordingButton: true
  enableTranscriptionButton: false
  enableChat: true
  enableScreenShare: true
  enableBreakoutRooms: true
  ui:
    prejoinPageEnabled: true
    startWithAudioMuted: true
    startWithVideoMuted: true
roles:
  - role: master_host
    actions:
      - breakout:create
      - breakout:close
      - breakout:auto-assign
      - breakout:dispatch
      - recording:start
      - recording:stop
      - notification:send
      - member:speak-control
      - meeting:password-update
      - config:edit
  - role: group_host
    actions:
      - group:member-manage
      - recording:start
      - recording:stop
      - notification:send
      - member:speak-control
  - role: member
    actions:
      - meeting:join
      - member:raise-hand
meetingTemplate:
  mainRoomName: main-hall
  groups:
    - id: group-a
      name: 第一组
      defaultHostUserId: host-a
      autoAssign: true
      allowManualDispatch: true
    - id: group-b
      name: 第二组
      defaultHostUserId: host-b
      autoAssign: true
      allowManualDispatch: true
users:
  - id: master-1
    username: master
    displayName: 总主持
    role: master_host
    groupId: ""
    # 示例口令为 Master@123，仅用于首启验证。
    passwordHash: $2b$10$f32QrigR.7dJSuHMYhoC/u2gGKD4J.0.PVBVgr3ekRJVKn3H9iequ
    canStartRecording: true
    canStartTranscription: true
  - id: host-a
    username: host_a
    displayName: 一组主持
    role: group_host
    groupId: group-a
    passwordHash: $2b$10$f32QrigR.7dJSuHMYhoC/u2gGKD4J.0.PVBVgr3ekRJVKn3H9iequ
    canStartRecording: true
    canStartTranscription: false
  - id: host-b
    username: host_b
    displayName: 二组主持
    role: group_host
    groupId: group-b
    passwordHash: $2b$10$f32QrigR.7dJSuHMYhoC/u2gGKD4J.0.PVBVgr3ekRJVKn3H9iequ
    canStartRecording: true
    canStartTranscription: false
  - id: member-1
    username: member_01
    displayName: 普通成员01
    role: member
    groupId: group-a
    passwordHash: $2b$10$f32QrigR.7dJSuHMYhoC/u2gGKD4J.0.PVBVgr3ekRJVKn3H9iequ
    canStartRecording: false
    canStartTranscription: false
recordingPolicy:
  defaultRecord: false
  allowedRoles:
    - master_host
    - group_host
  allowedRoomIds:
    - main
    - group-a
    - group-b
  allowGroupRecording: true
  allowIndependentTranscription: false
notifications:
  enabled: true
  templates:
    join: 欢迎加入会场
    dispatch: 你已被调度到新的分组
    recordingStarted: 录制已开始
    recordingStopped: 录制已停止
matrixWall:
  enabled: true
  minTilesPerGroup: 2
  maxTilesPerGroup: 6
  rotateSeconds: 30
  maxConcurrentIframes: 12
